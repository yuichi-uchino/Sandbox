AWSTemplateFormatVersion: 2010-09-09

Parameters:
  Environment:
    Type: String
    Description: "Deployment environment: dev, stg, or prod"
    # デプロイ先の環境（例：開発環境、ステージング環境、本番環境）
    AllowedValues:
      - dev
      - stg
      - prod
    Default: dev

  NetworkStackName:
    Type: String
    Description: "The name of the network stack to reference"
    Default: network-stack

  AlbStackName:
    Type: String
    Description: "The name of the ALB stack to reference"
    Default: alb-stack

#  EcrRepositoryName:
#    Type: String
#    Description: "The name of the ECR repository for the app image"

  AppInstanceType:
    Type: String
    Default: t2.micro

Resources:
  AppInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-app-instance-role
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${AWS::StackName}-app-instance-profile
      Roles:
        - !Ref AppInstanceRole

  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${AWS::StackName}-app-lt
      LaunchTemplateData:
        ImageId: ami-052a04fa021790f0e
        InstanceType: !Ref AppInstanceType
        IamInstanceProfile:
          Arn: !GetAtt AppInstanceProfile.Arn
        SecurityGroupIds:
          - Fn::ImportValue:
              !Sub ${NetworkStackName}-AppSecurityGroupId
        UserData:
          Fn::Base64: |
            #!/bin/bash
            echo "hello from app user data" | tee /tmp/userdata-test.log
        MetadataOptions:
          HttpTokens: required
  AppInstance:
    Type: AWS::EC2::Instance
    Properties: # インスタンスプロファイルはImage Builderで作成したIAMロールを使用する
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      SubnetId:
        Fn::ImportValue:
          !Sub ${NetworkStackName}-PrivateAppSubnetAId
