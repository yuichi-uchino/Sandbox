AWSTemplateFormatVersion: 2010-09-09

Parameters:
  Environment:
    Type: String
    Description: >
      デプロイ対象の環境を指定します。dev は開発環境、stg はステージング環境、
      prod は本番環境を表し、環境ごとの命名や設定切り替えに利用します。
    AllowedValues:
      - dev
      - stg
      - prod
    Default: dev

  NetworkStackName:
    Type: String
    Description: >
      VPC、アプリケーション用サブネット、EC2 用セキュリティグループなどの
      ネットワークリソースを Export している CloudFormation スタック名を指定します。
    Default: network-stack

  AlbStackName:
    Type: String
    Description: >
      Application Load Balancer やターゲットグループなどの ALB 関連リソースを
      Export している CloudFormation スタック名を指定します。
    Default: alb-stack

#  EcrRepositoryName:
#    Type: String
#    Description: "The name of the ECR repository for the app image"

  AppInstanceType:
    Type: String
    Description: >
      アプリケーションを実行する EC2 インスタンスのインスタンスタイプを指定します。
      環境や負荷に応じて CPU、メモリ、コストのバランスを調整するために利用します。
    Default: t2.micro

Resources:
  AppInstanceRole:
    Type: AWS::IAM::Role
    Metadata:
      Description: >
        アプリケーション用 EC2 インスタンスに付与する IAM ロールを作成します。
        EC2 がこのロールを引き受け、Systems Manager 経由で管理できるように
        AmazonSSMManagedInstanceCore 管理ポリシーを関連付けます。
    Properties:
      RoleName: !Sub ${AWS::StackName}-app-instance-role
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Metadata:
      Description: >
        アプリケーション用 EC2 インスタンスへ IAM ロールを渡すための
        インスタンスプロファイルを作成します。起動テンプレートから参照され、
        インスタンス起動時に AppInstanceRole を関連付けます。
    Properties:
      InstanceProfileName: !Sub ${AWS::StackName}-app-instance-profile
      Roles:
        - !Ref AppInstanceRole

  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Metadata:
      Description: >
        アプリケーション用 EC2 インスタンスの起動設定をまとめた Launch Template を
        作成します。AMI、インスタンスタイプ、IAM インスタンスプロファイル、
        セキュリティグループ、ユーザーデータ、IMDSv2 必須設定を定義します。
    Properties:
      LaunchTemplateName: !Sub ${AWS::StackName}-app-lt
      LaunchTemplateData:
        ImageId: ami-052a04fa021790f0e
        InstanceType: !Ref AppInstanceType
        IamInstanceProfile:
          Arn: !GetAtt AppInstanceProfile.Arn
        SecurityGroupIds:
          - Fn::ImportValue:
              !Sub ${NetworkStackName}-AppSecurityGroupId
        UserData:
          Fn::Base64: |
            #!/bin/bash
            echo "hello from app user data" | tee /tmp/userdata-test.log
        MetadataOptions:
          HttpTokens: required
  AppInstance:
    Type: AWS::EC2::Instance
    Metadata:
      Description: >
        アプリケーションを実行する EC2 インスタンスを作成します。
        起動テンプレートの最新バージョンを使用し、ネットワークスタックから
        インポートしたプライベートアプリケーション用サブネットへ配置します。
    Properties: # インスタンスプロファイルはImage Builderで作成したIAMロールを使用する
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      SubnetId:
        Fn::ImportValue:
          !Sub ${NetworkStackName}-PrivateAppSubnetAId
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-app-instance
