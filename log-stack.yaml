AWSTemplateFormatVersion: 2010-09-09

Parameters:
  Environment:
    Type: String
    Description: >
      デプロイ対象の環境を指定します。dev は開発環境、stg はステージング環境、
      prod は本番環境を表し、ログリソースの識別や環境別の設定に利用します。
    AllowedValues:
      - dev
      - stg
      - prod
    Default: dev

  KmsStackName:
    Type: String
    Description: >
      CloudWatch Logs 暗号化用の KMS キー ARN を Export している
      CloudFormation スタック名を指定します。ロググループの KMS 暗号化設定で参照します。
    Default: kms-stack

Resources:
  AppLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      Description: >
        アプリケーション用 EC2 インスタンスのログを保存する CloudWatch Logs
        ロググループを作成します。ログは 7 日間保持し、KMS スタックから
        インポートした KMS キーで暗号化します。スタック削除や置換時にもログを保持します。
    Properties:
      LogGroupName: !Sub /aws/ec2/${AWS::StackName}
      RetentionInDays: 7
      KmsKeyId:
        Fn::ImportValue:
          !Sub ${KmsStackName}-CloudWatchLogsKmsKeyArn
