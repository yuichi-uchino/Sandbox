AWSTemplateFormatVersion: 2010-09-09

Parameters:
  Environment:
    Type: String
    Description: >
      デプロイ対象の環境を指定します。dev は開発環境、stg はステージング環境、
      prod は本番環境を表し、環境ごとの命名や設定切り替えに利用します。
    AllowedValues:
      - dev
      - stg
      - prod
    Default: dev

  NetworkStackName:
    Type: String
    Description: >
      VPC、プライベートサブネット、ルートテーブル、エンドポイント用
      セキュリティグループなどのネットワークリソースを Export している
      CloudFormation スタック名を指定します。
    Default: network-stack

Resources:
  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Metadata:
      Description: >
        プライベートサブネットから Amazon ECR API へ VPC 内経由でアクセスするための
        Interface VPC Endpoint を作成します。イメージ情報の取得や認証トークン取得など、
        ECR API 操作をインターネットへ出さずに実行できるようにします。
    Properties:
      VpcId:
        Fn::ImportValue:
          !Sub ${NetworkStackName}-VPCId
      VpcEndpointType: Interface
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.api
      PrivateDnsEnabled: true
      SubnetIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetAId
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetCId
      SecurityGroupIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-EndpointSecurityGroupId

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Metadata:
      Description: >
        プライベートサブネットから Amazon ECR Docker Registry へ VPC 内経由で
        アクセスするための Interface VPC Endpoint を作成します。
        コンテナイメージの pull や push をインターネット経由にせず実行できます。
    Properties:
      VpcId:
        Fn::ImportValue:
          !Sub ${NetworkStackName}-VPCId
      VpcEndpointType: Interface
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.dkr
      PrivateDnsEnabled: true
      SubnetIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetAId
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetCId
      SecurityGroupIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-EndpointSecurityGroupId

  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Metadata:
      Description: >
        プライベートサブネット内のリソースから Amazon CloudWatch Logs へ
        VPC 内経由でログを送信するための Interface VPC Endpoint を作成します。
        NAT Gateway やインターネット経路に依存せずログ出力できるようにします。
    Properties:
      VpcId:
        Fn::ImportValue:
          !Sub ${NetworkStackName}-VPCId
      VpcEndpointType: Interface
      ServiceName: !Sub com.amazonaws.${AWS::Region}.logs
      PrivateDnsEnabled: true
      SubnetIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetAId
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetCId
      SecurityGroupIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-EndpointSecurityGroupId

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Metadata:
      Description: >
        プライベートアプリケーション用ルートテーブルに Amazon S3 への
        Gateway VPC Endpoint を関連付けます。S3 への通信を AWS ネットワーク内で
        完結させ、NAT Gateway やインターネット経路を使わずにアクセスできるようにします。
    Properties:
      VpcId:
        Fn::ImportValue:
          !Sub ${NetworkStackName}-VPCId
      VpcEndpointType: Gateway
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      RouteTableIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppRouteTableId

  SSMEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Metadata:
      Description: >
        プライベートサブネット内の EC2 インスタンスが AWS Systems Manager の
        SSM API へ VPC 内経由でアクセスするための Interface VPC Endpoint を作成します。
        インスタンス管理やセッション開始に必要な SSM 操作を可能にします。
    Properties:
      VpcEndpointType: Interface
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ssm
      PrivateDnsEnabled: true
      VpcId:
        Fn::ImportValue:
          !Sub ${NetworkStackName}-VPCId
      SubnetIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetAId
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetCId
      SecurityGroupIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-EndpointSecurityGroupId

  SSMMessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Metadata:
      Description: >
        Systems Manager Session Manager のメッセージ通信に必要な
        ssmmessages 用 Interface VPC Endpoint を作成します。プライベートサブネット内の
        EC2 インスタンスと SSM サービス間のセッション通信を VPC 内経由で行えるようにします。
    Properties:
      VpcEndpointType: Interface
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ssmmessages
      PrivateDnsEnabled: true
      VpcId:
        Fn::ImportValue:
          !Sub ${NetworkStackName}-VPCId
      SubnetIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetAId
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetCId
      SecurityGroupIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-EndpointSecurityGroupId

  EC2MessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Metadata:
      Description: >
        Systems Manager が EC2 インスタンスと制御メッセージをやり取りするために必要な
        ec2messages 用 Interface VPC Endpoint を作成します。プライベートサブネット内の
        インスタンスをインターネット経由にせず Systems Manager で管理できるようにします。
    Properties:
      VpcEndpointType: Interface
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ec2messages
      PrivateDnsEnabled: true
      VpcId:
        Fn::ImportValue:
          !Sub ${NetworkStackName}-VPCId
      SubnetIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetAId
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PrivateAppSubnetCId
      SecurityGroupIds:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-EndpointSecurityGroupId
