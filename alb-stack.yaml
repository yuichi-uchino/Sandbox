AWSTemplateFormatVersion: 2010-09-09

Parameters:
  Environment:
    Type: String
    Description: >
      デプロイ対象の環境を指定します。dev は開発環境、stg はステージング環境、
      prod は本番環境を表し、リソース名や環境別の設定切り替えに利用します。
    AllowedValues:
      - dev
      - stg
      - prod
    Default: dev

  NetworkStackName:
    Type: String
    Description: >
      VPC、パブリックサブネット、ALB 用セキュリティグループなどのネットワーク
      リソースを Export している CloudFormation スタック名を指定します。
    Default: network-stack

  AppPort:
    Type: Number
    Description: >
      アプリケーションが HTTP リクエストを受け付けるポート番号を指定します。
      ALB のターゲットグループがバックエンドインスタンスへ転送する宛先ポートです。
    Default: 8080

  HealthCheckPath:
    Type: String
    Description: >
      ALB ターゲットグループがアプリケーションの正常性を確認するためにアクセスする
      HTTP パスを指定します。正常時に 200 を返すエンドポイントを設定します。
    Default: /actuator/health

Resources:
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Metadata:
      Description: >
        インターネット向けの Application Load Balancer を作成します。
        ネットワークスタックからインポートしたパブリックサブネットと
        セキュリティグループを使用し、HTTP リクエストを受け付ける入口になります。
    Properties:
      Name: !Sub ${AWS::StackName}-alb
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      SecurityGroups:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-ALBSecurityGroupId
      Subnets:
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PublicSubnetAId
        - Fn::ImportValue:
            !Sub ${NetworkStackName}-PublicSubnetCId
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: true

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Metadata:
      Description: >
        ALB から転送された HTTP リクエストを受けるアプリケーション用ターゲット
        グループを作成します。指定されたアプリケーションポートとヘルスチェックパスを
        使って、登録されたインスタンスの稼働状態を判定します。
    Properties:
      Name: !Sub ${AWS::StackName}-tg
      TargetType: instance
      VpcId:
        Fn::ImportValue:
          !Sub ${NetworkStackName}-VPCId
      Protocol: HTTP
      Port: !Ref AppPort
      HealthCheckProtocol: HTTP
      HealthCheckPath: !Ref HealthCheckPath
      Matcher:
        HttpCode: 200
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      HealthCheckTimeoutSeconds: 5

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Metadata:
      Description: >
        Application Load Balancer の 80 番ポートで HTTP 通信を待ち受ける
        リスナーを作成します。受信したリクエストはデフォルトアクションとして
        アプリケーション用ターゲットグループへ転送します。
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

Outputs:
  AlbArn:
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub ${AWS::StackName}-AlbArn

  AlbDnsName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub ${AWS::StackName}-AlbDnsName

  AlbUrl:
    Value: !Sub http://${ApplicationLoadBalancer.DNSName}

  TargetGroupArn:
    Value: !Ref AppTargetGroup
    Export:
      Name: !Sub ${AWS::StackName}-TargetGroupArn

  ListenerArn:
    Value: !Ref HttpListener
    Export:
      Name: !Sub ${AWS::StackName}-HttpListenerArn
