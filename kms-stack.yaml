AWSTemplateFormatVersion: 2010-09-09

###
# kmsはスタックを削除してもすぐに削除されず、削除保護期間が発生する。
# そのため、kms管理専用のスタックにて管理を行う。
# また、本来は各リソースに対してkmsキーを個別に作成することが推奨されるが、
# 過剰コストのため、おおまかなリソース単位で作成する予定。
###
Description: >
  共有セキュリティリソースで利用する KMS キーを管理するテンプレートです。
  KMS キーはスタック削除後も削除待機期間が発生するため、専用スタックで管理します。

Parameters:
  Environment:
    Type: String
    Description: >
      デプロイ対象の環境を指定します。dev は開発環境、stg はステージング環境、
      prod は本番環境を表し、KMS キーの説明や関連リソースの識別に利用します。
    AllowedValues:
      - dev
      - stg
      - prod
    Default: dev

Resources:
  CloudWatchLogsKmsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      Description: >
        CloudWatch Logs のロググループ暗号化に使用する KMS キーを作成します。
        キーローテーションを有効化し、スタック削除や置換時にもキーを保持することで、
        既存ログの復号に必要なキーを誤って削除しないようにします。
    Properties:
      Description: !Sub KMS key for CloudWatch Logs - ${Environment}
      EnableKeyRotation: true
      PendingWindowInDays: 7
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableAccountRootPermissions
            Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: "*"

          - Sid: AllowCloudWatchLogsUseKey
            Effect: Allow
            Principal:
              Service: !Sub logs.${AWS::Region}.${AWS::URLSuffix}
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: "*"
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn:
                  - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/vpcflowlogs/*
                  - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/ec2/*
                  - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/states/*

  CloudWatchLogsKmsAlias:
    Type: AWS::KMS::Alias
    Metadata:
      Description: >
        CloudWatch Logs 用 KMS キーを参照しやすくするためのエイリアスを作成します。
        スタック名を含む alias パスを付けることで、環境や用途ごとのキーを識別しやすくします。
    Properties:
      AliasName: !Sub alias/${AWS::StackName}/cloudwatch-logs
      TargetKeyId: !Ref CloudWatchLogsKmsKey

  StepFunctionsKmsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      Description: >
        SFnのステートマシンのリソースを暗号化に使用する KMS キーを作成します。
        キーローテーションを有効化し、スタック削除や置換時にもキーを保持することで、
        既存ログの復号に必要なキーを誤って削除しないようにします。
    Properties:
      Description: KMS key for Step Functions state machine
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableAccountRootPermissions
            Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: "*"

          - Sid: AllowStepFunctionsUseKey
            Effect: Allow
            Principal:
              Service: !Sub states.${AWS::Region}.${AWS::URLSuffix}
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: "*"
            Condition:
              StringEquals:
                kms:EncryptionContext:aws:states:stateMachineArn:
                  - !Sub arn:${AWS::Partition}:states:${AWS::Region}:${AWS::AccountId}:stateMachine:cost-control-delete-stack

  StepFunctionsKmsAlias:
    Type: AWS::KMS::Alias
    Metadata:
      Description: >
        Step Functions 用 KMS キーを参照しやすくするためのエイリアスを作成します。
        スタック名を含む alias パスを付けることで、環境や用途ごとのキーを識別しやすくします。
    Properties:
      AliasName: !Sub alias/${AWS::StackName}/step-functions
      TargetKeyId: !Ref StepFunctionsKmsKey

Outputs:
  CloudWatchLogsKmsKeyArn:
    Description: >
      CloudWatch Logs の暗号化に利用する KMS キー ARN を出力します。
      他スタックから参照できるように Export 名も付与します。
    Value: !GetAtt CloudWatchLogsKmsKey.Arn
    Export:
      Name: !Sub ${AWS::StackName}-CloudWatchLogsKmsKeyArn
  StepFunctionsKmsKeyArn:
    Description: >
      Step Functions の暗号化に利用する KMS キー ARN を出力します。
      他スタックから参照できるように Export 名も付与します。
    Value: !GetAtt StepFunctionsKmsKey.Arn
    Export:
      Name: !Sub ${AWS::StackName}-StepFunctionsKmsKeyArn
